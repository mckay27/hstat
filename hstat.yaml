            x: 250
            y: 190
            text_font: montserrat_10
            pad_all: 2
            styles: button_style
            scales:
              - range_from: 0
                range_to: 100
                angle_range: 240
                rotation: 150
                ticks:
                  width: 1
                  count: 51
                  length: 10
                  major:
                    stride: 10
                    width: 1
                    length: 10
                    color: 0x404040
                    label_gap: 10
              - range_from: 0
                range_to: 1000
                angle_range: 240
                rotation: 150
                ticks:
                  count: 0
                indicators:
                  - line:
                      id: int_temp_needle
                      width: 1
