esphome:
  name: hstat
  friendly_name: hstat
  on_boot:
    # Update arc on boot with value from thermostat component
    - lvgl.arc.update:
        id: thermostat_arc
        value: !lambda return (((id(heat_thermostat).target_temperature * (9.0/5.0)) + 32) - 30) * 2.0;

esp32:
  board: esp32dev
  framework:
    type: arduino
  flash_size: 16MB

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: CHANGE_ME

ota:
  - platform: esphome
    password: "265882b31237b4d6ee6fac8454f1bce2"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Hstat Fallback Hotspot"
    password: "arlj55N3HC6o"

# NTP Time setup
time:
  - platform: sntp
    id: sntp_time
    timezone: America/Denver
    on_time:
      # Update clock string every second
      - seconds: /1
        minutes: /1
        then:
          - lvgl.label.update:
              id: cur_time
              text:
                time_format: "%I:%M:%S"
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: cur_time_suffix
              text:
                time_format: "%p"
      # Enable antiburn at 2:05AM through 5:05AM every hour
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      # Disable antiburn after 30 minutes
      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn

# ESP32 N16R8 PSRAM
psram:
  mode: quad
  speed: 80MHz

# I2C Bus for on board temp and touch
i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
    scan: false
    frequency: 400

# One Wire bus for external DS18B20 temp sensor
one_wire:
  - platform: gpio
    pin: 5

# SPI interface for display
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: spi2

# LCD Backlight dimming control
output:
  - platform: ledc
    pin: GPIO27
    id: backlight_pwm

switch:
  # Yellow LED output
  - platform: gpio
    id: yellow_led
    pin:
      number: GPIO0
      mode: output
    name: "Yellow LED"
  # Set output relay
  - platform: gpio
    id: set_sw
    pin:
      number: GPIO2
      mode: output
    name: "SET"
  # Reset output relay
  - platform: gpio
    id: reset_sw
    pin:
      number: GPIO4
      mode: output
    name: "RESET"
  # Wrap set/reset relay outputs into one switch with delay to turn off output pins
  - platform: template
    id: heat_output
    name: "Heat Output"
    optimistic: true
    turn_on_action:
      - switch.turn_on: yellow_led
      - switch.turn_on: set_sw
      - delay: 50ms
      - switch.turn_off: set_sw
    turn_off_action:
      - switch.turn_off: yellow_led
      - switch.turn_on: reset_sw
      - delay: 50ms
      - switch.turn_off: reset_sw
  # Control LCD antiburn
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - light.turn_off: display_backlight
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

# GPIO inputs
binary_sensor:
  # Button 1, tie to toggling thermostat mode
  - platform: gpio
    pin:
      number: GPIO32
      inverted: true
    name: "BTN 1"
    id: mode_btn
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(heat_thermostat).mode == CLIMATE_MODE_OFF;'
            then:
              climate.control:
                id: heat_thermostat
                mode: HEAT
            else:
              climate.control:
                id: heat_thermostat
                mode: 'OFF'
  - platform: gpio
    pin:
      number: GPIO33
      inverted: true
    name: "BTN 2"
    id: dwn_btn
  - platform: gpio
    pin:
      number: GPIO34
      inverted: true
    name: "BTN 3"
    id: up_btn
  - platform: gpio
    pin:
      number: GPIO35
      inverted: true
    name: "BTN 4"
    id: enter_btn

sensor:
  # Onboard temp/humidity sensor
  - platform: hdc1080
    i2c_id: bus_a
    temperature:
      name: "hstat temperature"
      id: cur_temp
      on_value:
        - lvgl.label.update:
            id: thermostat_cur_temp
            text:
              format: "%.1f°F"
              args: [ 'x * (9.0/5.0) + 32' ]
        - lvgl.indicator.update:
            id: int_temp_needle
            value: !lambda return (x * (9.0/5.0) + 32) * 10;
        - lvgl.label.update:
            id: temp_int
            text:
              format: "%.1f°F"
              args: [ 'x * (9.0/5.0) + 32' ]
      # Onboard temperature sensor calibration (in C)
      #filters:
      #  - calibrate_linear:
          # Map X (from sensor) to Y (true value)
      #    - 0.0 -> 1.0

    humidity:
      name: "hstat humidity"
      on_value:
        - lvgl.indicator.update:
            id: int_humidity_needle
            value: !lambda return x * 10;
        - lvgl.label.update:
            id: humidity_int
            text:
              format: "%.1f%%"
              args: [ 'x' ]
    update_interval: 30s
  # VBUS measurement, if VBUS is lost, force thermostat to be off
  - platform: adc
    id: vbus_voltage
    pin: GPIO36
    name: "VBUS"
    update_interval: 30s
    filters:
      - multiply: 6.1
    on_value_range:
      - below: 4.0
        then:
          - climate.control:
              id: heat_thermostat
              mode: "OFF"
  # External temperature sensor, update one_wire address here for new sensors
  - platform: dallas_temp
    address: 0x9200000037eeee28
    name: ext_temperature
    update_interval: 30s
    on_value:
      - lvgl.indicator.update:
          id: ext_temp_needle
          value: !lambda return (x * (9.0/5.0) + 32) * 10;
      - lvgl.label.update:
          id: temp_ext
          text:
            format: "%.1f°F"
            args: [ 'x * (9.0/5.0) + 32' ]

climate:
  # Thermostat component
  - platform: thermostat
    id: heat_thermostat
    name: "HSTAT thermostat"
    on_boot_restore_from: memory
    sensor: cur_temp
    # Minimum duration heat must be off before being re-engaged
    min_heating_off_time: 1s
    # Minimum duration heat must be on before being disengaged
    min_heating_run_time: 1s
    # Minimum duration idle action must be active before going to another mode
    min_idle_time: 1s
    # Minimum temperature below the set point before calling for heat
    heat_deadband: 2
    # Maximum temperature about the set point before calling for idle
    heat_overrun: 2
    heat_action:
      - switch.turn_on: heat_output
      - lvgl.label.update:
          id: thermostat_cur_mode
          text: "Heating"
    idle_action:
      - switch.turn_off: heat_output
      - lvgl.label.update:
          id: thermostat_cur_mode
          text: "Idle"
    visual:
      min_temperature: -1.2
      max_temperature: 32.3
      temperature_step:
        target_temperature: 0.5
        current_temperature: 0.1
    target_temperature_change_action: 
      then:
        - lvgl.arc.update:
            id: thermostat_arc
            value: !lambda return (((id(heat_thermostat).target_temperature * (9.0/5.0)) + 32) - 30.0) * 2.0;
        - lvgl.label.update:
            id: thermostat_cur_set
            text:
              format: "%.1f°F"
              args: [ '(id(heat_thermostat).target_temperature * (9.0/5.0)) + 32' ]
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x.mode == CLIMATE_MODE_HEAT;'
            then:
              lvgl.widget.update:
                id: btn_pwr_tog
                state:
                  checked: True
            else:
              lvgl.widget.update:
                id: btn_pwr_tog
                state:
                  checked: False

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: display_backlight
    restore_mode: RESTORE_AND_ON

number:
  - platform: template
    name: LVGL Screen timeout
    optimistic: True
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: True
    min_value: 10
    max_value: 180
    step: 5
    mode: box

display:
  - platform: ili9xxx
    id: disp1
    model: ST7796
    dc_pin: GPIO25
    reset_pin: GPIO23
    cs_pin: GPIO15
    invert_colors: false
    auto_clear_enabled: False
    dimensions:
      height: 320
      width: 480
    transform:
      swap_xy: true
      mirror_y: true
      mirror_x: true
    data_rate: 80MHz

touchscreen:
  - platform: ft63x6
    display: disp1
    interrupt_pin: GPIO18
    reset_pin: GPIO19
    transform:
      swap_xy: true
      mirror_y: true
      mirror_x: false
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

lvgl:
  displays:
    - disp1
  style_definitions:
    - id: button_style
      text_color: 0x6e8b9e
      bg_color: 0x282828
      border_color: 0x121212
    - id: button_pressed
      
    - id: text_style
      text_color: 0xabbbc7
      bg_color: 0x121212
    - id: arc_style
      arc_color: 0x181b1c
    - id: arc_knob
      bg_color: 0x466d84
  #on_idle:
    # Disable display timeout
    #timeout: !lambda "return (id(display_timeout).state * 1000);"
    #then:
    #  - logger.log: "LVGL is idle"
    #  - light.turn_off: display_backlight
    #  - lvgl.pause:
  keypads:
    enter: enter_btn
    next: up_btn
    prev: dwn_btn
  pages:
    - id: thermostat_page
      bg_color: 0x121212
      widgets:
        - arc:
            id: thermostat_arc
            width: 240
            height: 240
            x: 20
            y: 20
            adjustable: true
            styles: arc_style
            knob:
              styles: arc_knob
            min_value: 0
            max_value: 120
            on_change:
              - climate.control:
                  id: heat_thermostat
                  target_temperature: !lambda return ((((float)x / 2.0) + 30.0) - 32.0) / 1.8 ;
        - label:
            id: thermostat_cur_mode
            text: "Idle"
            text_align: CENTER
            text_font: montserrat_18
            width: 240
            x: 20
            y: 90
            styles: text_style
        - label:
            id: thermostat_cur_set
            text: "74.0°F"
            text_align: CENTER
            text_font: montserrat_48
            width: 240
            x: 20
            y: 115
            styles: text_style
        - label:
            id: thermostat_cur_temp
            text: "40.0°F"
            text_align: CENTER
            text_font: montserrat_22
            width: 240
            x: 20
            y: 174
            styles: text_style
        - obj:
            width: 240
            height: 75
            x: 20
            y: 245
            pad_all: 0
            border_width: 0
            bg_opa: TRANSP
            border_opa: TRANSP
            layout:
              type: flex
              flex_flow: ROW
              flex_align_main: CENTER
            widgets:
              - button:
                  id: btn_dwn_temp
                  width: 60
                  height: 60
                  pad_all: 0
                  radius: 30
                  styles: button_style
                  widgets:
                    - label:
                        align: CENTER
                        text: "-"
                        text_font: montserrat_24
                  on_short_click:
                    - climate.control:
                        id: heat_thermostat
                        target_temperature: !lambda return id(heat_thermostat).target_temperature - (0.5 * (5.0/9.0));
              - button:
                  id: btn_pwr_tog
                  width: 60
                  height: 60
                  pad_all: 0
                  radius: 30
                  checkable: true
                  styles: button_style
                  widgets:
                    - label:
                        align: CENTER
                        text: "\uF011"
                        text_font: montserrat_24
                  on_change:
                    - climate.control:
                        id: heat_thermostat
                        mode: !lambda |-
                          if (x == 1) {
                            return CLIMATE_MODE_HEAT;
                            }
                          else {
                            return CLIMATE_MODE_OFF;
                          }
              - button:
                  id: btn_up_temp
                  width: 60
                  height: 60
                  pad_all: 0
                  radius: 30
                  styles: button_style
                  widgets:
                    - label:
                        align: CENTER
                        text: "+"
                        text_font: montserrat_24
                  on_short_click:
                    - climate.control:
                        id: heat_thermostat
                        target_temperature: !lambda return id(heat_thermostat).target_temperature + (0.5 * (5.0/9.0));
        - button:
            id: menu_btn
            width: 40
            height: 40
            x: 420
            y: 20
            styles: button_style
            widgets:
              - label:
                  align: CENTER
                  text: "\uF0C9"
                  text_font: montserrat_28
        - label:
            id: cur_time
            width: 140
            x: 220
            y: 30
            text: "12:00:00"
            text_font: montserrat_22
            text_align: RIGHT
            styles: text_style
        - label:
            id: cur_time_suffix
            width: 40
            x: 365
            y: 30
            text: "PM"
            text_font: montserrat_22
            styles: text_style
        - meter:
            height: 100
